<div class="container m-8 checkout">
    <div class="row" *ngIf="products.length === 0">
        <span class="mx-3">No Items found</span>
        <a routerLink="/products" routerLinkActive="active-link">Continue to Shop</a>
    </div>
    <div class="row" *ngIf="products.length > 0">
        <div class="col-sm-7 col-xs-12">
            <div class="m-2 product-summary" *ngFor="let product of products; let i= index; trackBy: trackByProductId">
                <div class="product d-flex flex-row">
                    <img [src]="product.imageUrl" class="img-thumbnail"/>
                    <div class="p-2 product-summary-detail d-flex align-items-start flex-column">
                        <div class="mb-auto">
                            <span>{{product.productName}}</span>
                            <span> ₹ {{product.discountPrice}}</span>
                            <span class="text-muted d-block">{{product.description}}</span>
                        </div>
                        <button type="button" class="btn btn-light" (click)="removeItem($event, product.productId)">Remove</button>  
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-4 col-xs-12 m-2">
            <div class="d-flex flex-column justify-content-between order-summary ">
                <div class="mb-4 order-summary-header p-2">
                    <strong >Order Summary</strong>
                </div>
                <div class="p-2">
                <div class="d-flex justify-content-between" *ngFor="let product of products; let i= index; trackBy: trackByProductId">
                    <span>Price </span>
                    <span>₹ {{product.discountPrice}}</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Delivery Fee </span>
                    <span class="text-success">Free</span>
                </div>
                <hr/>
                <div class="d-flex justify-content-between">
                    <span>Total MRP</span>
                    <span>{{sum | number}}</span>
                </div>
            </div>
            </div>
        </div>
    </div>
</div>
